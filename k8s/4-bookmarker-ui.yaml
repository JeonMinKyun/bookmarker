apiVersion: v1
kind: Service
metadata:
  name: bookmarker-ui-svc
spec:
  ports:
  - name: 3000-3000
    port: 3000
    protocol: TCP
    targetPort: 3000
    nodePort: 30080
  selector:
    app: bookmarker-ui-pod
  type: NodePort


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmarker-ui-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookmarker-ui-pod
  strategy: {}
  template:
    metadata:
      labels:
        app: bookmarker-ui-pod
    spec:
      containers:
      - image: lucas0429/bookmark-ui-nextjs
        name: bookmarker-ui
        ports:
          - containerPort: 3000
        env:
          - name: NEXT_PUBLIC_CLIENT_SIDE_API_BASE_URL
            value: http://localhost:18080
          - name: SERVER_SIDE_API_BASE_URL
            value: http://bookmarker-api-svc:8080